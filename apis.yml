aid: copilot-instructions-md
url: >-
  https://raw.githubusercontent.com/api-evangelist/copilot-instructions-md/refs/heads/main/apis.yml
name: copilot-instructions.md
x-type: standard
description: >-
  copilot-instructions.md is a GitHub Copilot custom instructions file
  placed at .github/copilot-instructions.md in a repository. It provides
  repository-specific guidance and preferences that GitHub Copilot Chat,
  Copilot in the IDE, and the Copilot coding agent automatically inject
  into prompts when working in the repository. The file is plain Markdown
  in natural language, helping the AI understand build, test, validation,
  framework, and style conventions so it can produce code that is
  consistent with the project's expectations and reduce pull request
  rejections caused by avoidable lint, CI, or convention failures.
